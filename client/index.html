<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUA ERRE – Camille | Portfolio</title>
  <link href="https://fonts.googleapis.com/css?family=Josefin+Sans:700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Fira+Mono:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Fira+Code&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="assets/css/navigation.css">
  <link rel="stylesheet" href="assets/retro_font/stylesheet.css">
  <!-- Restore saved font immediately to avoid flash of unstyled content -->
  <script>
    (function () {
      var f = localStorage.getItem('portfolio-retro-font');
      if (f) {
        var s = document.createElement('style');
        s.textContent = "body { font-family: '" + f + "', 'Josefin Sans', Arial, sans-serif; }";
        document.head.appendChild(s);
      }
    })();
  </script>
</head>
<body>
  <div class="main-navigation" role="navigation" aria-label="Main navigation">
    <nav role="navigation">
      <a href="#home" data-section="home">Home</a>
      <a href="#gallery" data-section="gallery">Gallery</a>
      <a href="#about" data-section="about">About</a>
      <a href="#contact" data-section="contact">Contact</a>
    </nav>
  </div>

  <main>
    <section id="home" class="page-section section-home">
      <div class="section-glass">
        <div class="section-header">
          <h1 class="page__title">TUA ERRE – CAMILLE</h1>
          <p class="page__subtitle">Photographer & Visual Storyteller</p>
        </div>
      </div>
    </section>

    <section id="gallery" class="page-section section-gallery">
      <div class="section-glass">
        <div class="section-header">
          <h2 class="page__title">Gallery</h2>
          <p class="page__subtitle">Curated visual stories</p>
        </div>
        <div class="gallery-tabs" role="tablist" aria-label="Gallery filters">
          <button class="gallery-tab is-active" role="tab" aria-selected="true" data-tab="all">All</button>
          <button class="gallery-tab" role="tab" aria-selected="false" data-tab="portrait">Portrait</button>
          <button class="gallery-tab" role="tab" aria-selected="false" data-tab="wabi-sabi">Wabi-sabi</button>
          <button class="gallery-tab" role="tab" aria-selected="false" data-tab="street-photo">Street Photo</button>
        </div>

        <div class="gallery-panel-wrap" id="gallery-panel-wrap">
          <div class="gallery-panel is-active" role="tabpanel" data-panel="all">
            <div class="gallery-grid" id="gallery-grid-all"></div>
          </div>
          <div class="gallery-panel" role="tabpanel" data-panel="portrait" aria-hidden="true">
            <div class="gallery-grid" id="gallery-grid-portrait"></div>
          </div>
          <div class="gallery-panel" role="tabpanel" data-panel="wabi-sabi" aria-hidden="true">
            <div class="gallery-grid" id="gallery-grid-wabi-sabi"></div>
          </div>
          <div class="gallery-panel" role="tabpanel" data-panel="street-photo" aria-hidden="true">
            <div class="gallery-grid" id="gallery-grid-street-photo"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="page-section">
      <div class="section-glass">
        <div class="page__container">
          <div class="page__left">
            <h1 class="page__title">I'M TUA</h1>
            <div class="page__subtitle">Photographer & Visual Storyteller</div>
            <div class="page__text">
              <p>Based in the heart of France, I specialize in capturing authentic moments.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="contact" class="page-section section-contact">
      <div class="section-glass contact-glass-wrapper">
        <div class="contact-grid">
            <div class="glass-card info-card">
                <h2 class="contact-title">Get in touch</h2>
                <div class="contact-details">
                    <div class="detail-item"><i class="fas fa-envelope"></i> <a href="mailto:trangdoan17032408@gmail.com">trangdoan17032408@gmail.com</a></div>
                    <div class="detail-item"><i class="fas fa-phone"></i> <span>07 69 69 46 55</span></div>
                </div>
            </div>
            <div class="contact-form-wrapper">
                <div class="glass-card form-card">
                    <form id="contactForm" class="contact-form">
                        <input type="text" id="name" placeholder="Name" required class="glass-input">
                        <input type="email" id="email" placeholder="Email" required class="glass-input">
                        <textarea id="message" rows="5" placeholder="Message" required class="glass-input"></textarea>
                        <button type="submit" class="glass-button">Send Message <i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/scroll-navigation.js"></script>
  <script type="module" src="assets/js/init-page.js"></script>
  <script type="module" src="assets/js/font-switcher.js"></script>
</body>
</html>
